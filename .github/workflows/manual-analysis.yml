##
# 手動銘柄分析ワークフロー
#
# ユーザーが銘柄を指定して分析パイプラインを直接起動する。
# Monitor / IndicatorFilter をスキップし、Analyzer 以降を実行する。
#
# パイプライン:
#   manual_pipeline.py（Admission）→ main_pipeline.py --manual
#     1. Technical  … テクニカル指標取得
#     2. ImportantIndicators … 重要指標取得
#     3. Analyzer … 複数エージェントによる議論・最終判定
#     4. Planning … プラン YAML 生成
#     5. Watch … watchlist 更新 + Discord 通知
#     6. ActionLog … action_log 投入 + holdings 同期
##
name: Manual Analysis

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: '銘柄コード（例: NVDA, 3038）'
        required: true
        type: string
      mode:
        description: '投資モード'
        required: false
        type: choice
        options: [buy, sell]
        default: buy
      span:
        description: '投資期間'
        required: false
        type: choice
        options: [short, mid, long]
        default: mid
      market:
        description: '市場（空欄=自動判定）'
        required: false
        type: choice
        options: ['', US, JP]
        default: ''
      display_name:
        description: '表示名（空欄=ticker と同じ）'
        required: false
        type: string
        default: ''

jobs:
  manual-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        run: uv python install 3.12

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Setup Codex auth
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          mkdir -p ~/.codex
          printf '%s' "$CODEX_AUTH_JSON" > ~/.codex/auth.json
          cat > ~/.codex/config.toml << 'EOF'
          model = "gpt-5.4"
          model_reasoning_effort = "high"
          EOF

      - name: Install Technical dependencies
        working-directory: Technical
        run: uv sync --no-install-project

      - name: Install ImportantIndicators dependencies
        working-directory: ImportantIndicators
        run: uv sync --no-install-project

      - name: Install Monitor dependencies
        working-directory: Monitor/src
        run: uv sync

      - name: Install Analyzer dependencies
        working-directory: Analyzer/src
        run: uv sync

      - name: Install Planning dependencies
        working-directory: Planning/src
        run: uv sync

      - name: Install Watch dependencies
        working-directory: Watch/src
        run: uv sync

      - name: Run Manual Analysis pipeline
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ZHIPUAI_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
        run: |
          ARGS="${{ inputs.ticker }} --mode ${{ inputs.mode }} --span ${{ inputs.span }}"
          if [ -n "${{ inputs.market }}" ]; then
            ARGS="$ARGS --market ${{ inputs.market }}"
          fi
          if [ -n "${{ inputs.display_name }}" ]; then
            ARGS="$ARGS --display-name ${{ inputs.display_name }}"
          fi
          uv run --project Monitor/src python manual_pipeline.py $ARGS

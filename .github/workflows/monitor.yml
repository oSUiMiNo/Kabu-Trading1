##
# 手動 Monitor ワークフロー
#
# 定期スケジュールは event-monitor.yml（5分ポーリング）に統合済み。
# このワークフローはテスト実行や特定銘柄の手動チェック用に残す。
#
# パイプライン:
#   main_pipeline.py が以下を順に実行する
#     1. Monitor  … 各銘柄の現在価格 vs plan 想定価格を比較 → OK/NG 判定
#     2. Analyzer（NG時のみ）… Analyst / Devil's Advocate / Judge による多角的議論
#     3. Planning（NG時のみ）… 新 plan の生成・DB 登録
#     4. Watch … プラン結果をもとに watchlist サマリーを更新
#     5. Discord 通知 … 結果をラベル付き Embed で送信
##
name: Monitor

on:
  workflow_dispatch:
    inputs:
      market:
        description: '市場フィルタ（US / JP / 空欄=全銘柄）'
        required: false
        type: string
      ticker:
        description: '特定銘柄のみチェック（空欄=全銘柄）'
        required: false
        type: string
      monitor_only:
        description: '監視のみ（NG時にAnalyzer/Planningを起動しない）'
        required: false
        type: boolean
        default: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        run: uv python install 3.12

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Setup Codex auth
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          mkdir -p ~/.codex
          printf '%s' "$CODEX_AUTH_JSON" > ~/.codex/auth.json

      - name: Install Technical dependencies
        working-directory: Technical
        run: uv sync --no-install-project

      - name: Install Monitor dependencies
        working-directory: Monitor/src
        run: uv sync

      - name: Install Analyzer dependencies
        working-directory: Analyzer/src
        run: uv sync

      - name: Install Planning dependencies
        working-directory: Planning/src
        run: uv sync

      - name: Install ImportantIndicators dependencies
        working-directory: ImportantIndicators
        run: uv sync --no-install-project

      - name: Install Watch dependencies
        working-directory: Watch/src
        run: uv sync

      - name: Run Monitor → Analyzer → Planning → Watch pipeline
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ZHIPUAI_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.market }}" ]; then
            ARGS="$ARGS --market ${{ inputs.market }}"
          fi
          if [ -n "${{ inputs.ticker }}" ]; then
            ARGS="$ARGS --ticker ${{ inputs.ticker }}"
          fi
          if [ "${{ inputs.monitor_only }}" = "true" ]; then
            ARGS="$ARGS --monitor-only"
          fi
          uv run --project Monitor/src python main_pipeline.py $ARGS

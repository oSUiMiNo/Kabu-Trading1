##
# Night Worker
#
# 深夜帯（JST 3:05 / 4:05 / 5:05）に以下のメンテナンスタスクを実行する。
#   1. archive 品質レビュー → GitHub Issue 作成
#   2. words 重複統合
#
# 3回の cron 設定は冗長性のため。1回目で全件処理済みになれば
# 2・3回目は対象0件で即終了する。
##
name: Night Worker

on:
  # schedule:
  #   - cron: '5 18 * * *'  # ローカル移行により無効化
  workflow_dispatch:
    inputs:
      max_reviews:
        description: 'レビュー上限数（デフォルト20）'
        type: number
        default: 20
      dry_run:
        description: 'Issue作成なし（プレビューのみ）'
        type: boolean
        default: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: NightWorker/src
        run: uv sync

      - name: Run Night Worker
        working-directory: NightWorker/src
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZHIPUAI_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
        run: |
          MAX="${{ inputs.max_reviews || '20' }}"
          DRY_RUN="${{ inputs.dry_run }}"
          ARGS="--max-reviews $MAX"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          uv run python main.py $ARGS

      - name: Words Consolidation
        working-directory: NightWorker/src
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          DRY_RUN="${{ inputs.dry_run }}"
          if [ "$DRY_RUN" = "true" ]; then
            uv run python words_consolidator.py --dry-run
          else
            uv run python words_consolidator.py
          fi
